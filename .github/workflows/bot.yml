name: Noon Deals Bot

on:
  schedule:
    - cron: '0 4,8,12,16,20,0 * * *'
  workflow_dispatch:

jobs:
  post-deals:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          NOON_SESSION_COOKIE: ${{ secrets.NOON_SESSION_COOKIE }}
          ZENROWS_API_KEY: ${{ secrets.ZENROWS_API_KEY }}
        run: python main.py

      - name: Save posted products
        run: |
          git config user.name "Mohamed Gado"
          git config user.email "boogado@yahoo.com"
          git add posted.json state.json
          git diff --staged --quiet || git commit -m "chore: update state [skip ci]"
          git pull --rebase origin main
          git push
